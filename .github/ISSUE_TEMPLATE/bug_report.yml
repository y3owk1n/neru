name: Bug Report
description: File a bug report
labels: ["bug"]
body:
    - type: markdown
      attributes:
          value: |
              Thanks for taking the time to report a bug!
              Please check [existing issues](https://github.com/y3owk1n/neru/issues?q=is%3Aissue) first to avoid duplicates.

    - type: checkboxes
      attributes:
          label: Pre-flight checks
          options:
              - label: I have searched existing issues and this bug has not been reported yet
                required: true

    - type: input
      attributes:
          label: Neru version
          description: Run `neru version` and paste the output.
          placeholder: "1.26.0"
      validations:
          required: true

    - type: input
      attributes:
          label: macOS version
          description: Apple menu → About This Mac (e.g., 15.3.1)
          placeholder: "15.3.1"
      validations:
          required: true

    - type: dropdown
      attributes:
          label: Navigation mode
          description: Which mode were you using when the bug occurred?
          options:
              - Recursive Grid
              - Grid
              - Hints
              - Scroll
              - N/A (startup / config / general)
      validations:
          required: true

    - type: textarea
      attributes:
          label: What happened?
          description: Describe the bug clearly. What actually happened?
      validations:
          required: true

    - type: textarea
      attributes:
          label: What did you expect?
          description: What did you expect to happen instead?
      validations:
          required: true

    - type: textarea
      attributes:
          label: Steps to reproduce
          description: Minimal steps to reliably reproduce the issue.
          placeholder: |
              1. Launch Neru
              2. Press Cmd+Shift+C to enter recursive grid mode
              3. Press 'u' to select top-left quadrant
              4. ...
      validations:
          required: true

    - type: textarea
      attributes:
          label: Config (relevant sections)
          description: Paste the relevant sections of your config TOML. Remove any parts that aren't related to the bug.
          render: toml
      validations:
          required: false

    - type: textarea
      attributes:
          label: Screenshots / recordings
          description: For UI issues (overlay misalignment, missing hints, etc.), a screenshot or short recording is very helpful.
      validations:
          required: false

    - type: textarea
      attributes:
          label: Additional context
          description: |
              Any other relevant details: Mac model, keyboard type, other input apps (Karabiner-Elements, BetterTouchTool, Hammerspoon, etc.), affected application, or workarounds you've found.
      validations:
          required: false
