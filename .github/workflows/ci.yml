on:
    pull_request:
        branches: ["*"]
        # Release-please PRs only bump versions in CHANGELOG/manifest files.
        # The underlying code was already validated when the feature PRs merged
        # to main, so running the full CI matrix again is pure waste.
        paths-ignore:
            - "CHANGELOG.md"
            - ".release-please-manifest.json"
            - "release-please-config.json"
name: CI
permissions:
    contents: read
    pull-requests: read
jobs:
    checks:
        name: ${{ matrix.check }} (${{ matrix.os }})
        strategy:
            matrix:
                os: [macos-latest, ubuntu-latest, windows-latest]
                check: [lint, vet, test, build]
                include:
                    # Formatting check only on macOS (Objective-C clang-format)
                    - os: macos-latest
                      check: formatting
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v6
              with:
                  repository: ${{ github.event.pull_request.head.repo.full_name }}
                  ref: ${{ github.head_ref }}

            # Install Devbox on macOS and Linux only
            - name: Install Devbox
              if: runner.os != 'Windows'
              uses: jetify-com/devbox-install-action@v0.15.0
              with:
                  enable-cache: true

            # Install Go directly on Windows
            - name: Setup Go (Windows)
              if: runner.os == 'Windows'
              uses: actions/setup-go@v6
              with:
                  go-version-file: "go.mod"
                  cache: true

            # Install Golangci directly on Windows (install only, lint step runs it)
            - name: Setup Golangci (Windows)
              if: matrix.check == 'lint' && runner.os == 'Windows'
              uses: golangci/golangci-lint-action@v9
              with:
                  version: v2.11.3
                  install-only: true

            # Install just on Windows
            - name: Install just (Windows)
              if: runner.os == 'Windows'
              run: |
                  choco install just -y
              shell: pwsh

            # Run checks with Devbox on macOS and Linux
            - name: Run just lint
              if: matrix.check == 'lint' && runner.os != 'Windows'
              run: devbox run -- just lint

            - name: Run just fmt-check
              if: matrix.check == 'formatting' && runner.os != 'Windows'
              run: devbox run -- just fmt-check

            - name: Run just vet
              if: matrix.check == 'vet' && runner.os != 'Windows'
              run: devbox run -- just vet

            - name: Run just build
              if: matrix.check == 'build' && runner.os != 'Windows'
              run: devbox run -- just build

            - name: Run just test-all
              if: matrix.check == 'test' && runner.os != 'Windows'
              run: devbox run -- just test-all

            # Run checks directly on Windows
            - name: Run just lint (Windows)
              if: matrix.check == 'lint' && runner.os == 'Windows'
              run: just lint

            - name: Run just vet (Windows)
              if: matrix.check == 'vet' && runner.os == 'Windows'
              run: just vet

            - name: Run just build (Windows)
              if: matrix.check == 'build' && runner.os == 'Windows'
              run: just build
              shell: bash

            - name: Run just test-all (Windows)
              if: matrix.check == 'test' && runner.os == 'Windows'
              run: just test-all
              shell: bash
