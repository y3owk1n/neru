on:
    push:
        branches:
            - main

concurrency:
    group: nightly
    cancel-in-progress: true

permissions:
    contents: write

name: nightly

jobs:
    prepare-nightly-release:
        runs-on: ubuntu-latest
        outputs:
            release_tag: ${{ steps.meta.outputs.release_tag }}
            version_override: ${{ steps.meta.outputs.version_override }}
            macos_bundle_version: ${{ steps.meta.outputs.macos_bundle_version }}
            macos_short_version: ${{ steps.meta.outputs.macos_short_version }}
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Compute nightly metadata
              id: meta
              run: |
                  echo "release_tag=nightly" >> "$GITHUB_OUTPUT"
                  TIMESTAMP="$(date -u +'%Y%m%d%H%M%S')"
                  echo "version_override=nightly-${TIMESTAMP}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
                  echo "macos_bundle_version=${TIMESTAMP}" >> "$GITHUB_OUTPUT"
                  echo "macos_short_version=0.0.0" >> "$GITHUB_OUTPUT"

            - name: Recreate nightly release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  SHORT_SHA="${GITHUB_SHA::7}"
                  COMMIT_URL="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
                  NOTES_FILE="$(mktemp)"
                  cat > "${NOTES_FILE}" <<EOF
                  This pre-release is automatically built from the latest commit on \`main\`.

                  > [!WARNING]
                  > This is a nightly build, not a tagged release. It may include incomplete changes, regressions, or experimental behavior. Use a tagged release if you want the most stable experience.

                  ### Build Details

                  - **Commit:** [\`${SHORT_SHA}\`](${COMMIT_URL})
                  - **Branch:** \`main\`
                  - **Full SHA:** \`${GITHUB_SHA}\`

                  ### Artifacts

                  - \`neru-darwin-arm64.zip\` for macOS on Apple Silicon
                  - \`neru-darwin-amd64.zip\` for macOS on Intel
                  - \`neru-linux-amd64.zip\` for Linux x86_64
                  - \`neru-linux-arm64.zip\` for Linux ARM64

                  ### Feedback

                  If nightly regresses, please include the commit above when filing an issue so we can narrow it down faster.
                  EOF

                  gh release delete nightly --yes --cleanup-tag || true
                  gh release create nightly \
                    --target "${GITHUB_SHA}" \
                    --title "Neru Nightly" \
                    --notes-file "${NOTES_FILE}" \
                    --prerelease

                  RELEASE_ID="$(gh release view nightly --json databaseId --jq '.databaseId')"
                  gh api \
                    --method PATCH \
                    "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
                    -f draft=false \
                    -f prerelease=true

    publish-nightly-artifacts:
        needs: prepare-nightly-release
        uses: ./.github/workflows/publish-artifacts.yml
        with:
            release_tag: ${{ needs.prepare-nightly-release.outputs.release_tag }}
            version_override: ${{ needs.prepare-nightly-release.outputs.version_override }}
            macos_bundle_version: ${{ needs.prepare-nightly-release.outputs.macos_bundle_version }}
            macos_short_version: ${{ needs.prepare-nightly-release.outputs.macos_short_version }}
        secrets:
            upload_token: ${{ github.token }}
