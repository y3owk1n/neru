on:
    workflow_call:
        inputs:
            release_tag:
                required: true
                type: string
            version_override:
                required: true
                type: string
            macos_bundle_version:
                required: true
                type: string
            macos_short_version:
                required: true
                type: string
        secrets:
            upload_token:
                required: false
            # TODO: Add these once Developer ID signing is set up
            # mac_developer_id_cert:
            #     required: false
            # mac_developer_id_key:
            #     required: false
            # mac_dev_id_keychain_pwd:
            #     required: false
            # apple_notary_api_issuer:
            #     required: false
            # apple_notary_api_key_id:
            #     required: false
            # apple_notary_api_key:
            #     required: false
            # apple_team_id:
            #     required: false

name: publish-artifacts

jobs:
    build-darwin-arm64-artifacts:
        runs-on: macos-15
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-go@v6
              with:
                  go-version: "1.26.4"

            - uses: extractions/setup-just@v4
              with:
                  just-version: "1.54.0"

            - name: Build neru darwin arm64 artifact
              run: just release-ci-darwin arm64 ${{ inputs.version_override }}

            - name: Generate man pages
              run: go run ./cmd/genman build/man

            - name: Bundle neru-darwin-arm64
              run: |
                  mkdir -p build/arm64/Neru.app/Contents/{MacOS,Resources}
                  cp bin/neru-darwin-arm64 build/arm64/Neru.app/Contents/MacOS/neru
                  chmod +x build/arm64/Neru.app/Contents/MacOS/neru
                  cp resources/icon.icns build/arm64/Neru.app/Contents/Resources/icon.icns
                  cp resources/Neru.entitlements build/arm64/Neru.app/Contents/Resources/Neru.entitlements
                  mkdir -p build/arm64/share/man/man1
                  cp build/man/*.1 build/arm64/share/man/man1/
                  sed \
                    -e "s/BUNDLE_VERSION/${{ inputs.macos_bundle_version }}/g" \
                    -e "s/SHORT_VERSION/${{ inputs.macos_short_version }}/g" \
                    -e "s/BUILD_ID/${{ inputs.version_override }}/g" \
                    resources/Info.plist.template > build/arm64/Neru.app/Contents/Info.plist
                  mkdir -p build/arm64/bin
                  cp bin/neru-darwin-arm64 build/arm64/bin/neru
                  chmod +x build/arm64/bin/neru

            - name: Codesign neru-darwin-arm64 (ad-hoc)
              run: |
                  # TODO: Replace ad-hoc with Developer ID + notarization when cert is set up
                  #       Remove this step and uncomment the "Developer ID sign & notarize" step below.
                  codesign --force --deep --sign - \
                    --entitlements resources/Neru.entitlements \
                    --options runtime \
                    build/arm64/Neru.app

            # # TODO: Enable when Developer ID cert is set up (and disable the ad-hoc step above)
            # - name: Developer ID sign & notarize
            #   uses: ./.github/actions/developer-id-notarize
            #   with:
            #     app-path: build/arm64/Neru.app
            #     developer-id-identity: 'Developer ID Application: Your Name (TEAM_ID)'
            #     mac-developer-id-cert: ${{ secrets.mac_developer_id_cert }}
            #     mac-developer-id-key: ${{ secrets.mac_developer_id_key }}
            #     mac-dev-id-keychain-pwd: ${{ secrets.mac_dev_id_keychain_pwd }}
            #     apple-notary-api-issuer: ${{ secrets.apple_notary_api_issuer }}
            #     apple-notary-api-key-id: ${{ secrets.apple_notary_api_key_id }}
            #     apple-notary-api-key: ${{ secrets.apple_notary_api_key }}
            #     apple-team-id: ${{ secrets.apple_team_id }}

            - name: Package neru-darwin-arm64
              run: |
                  cd build/arm64
                  zip -r ../../neru-darwin-arm64.zip bin Neru.app share
                  cd ../..

            - name: Generate darwin arm64 checksum
              run: |
                  shasum -a 256 neru-darwin-arm64.zip | awk '{print $1}' > neru-darwin-arm64.zip.sha256
                  ls -l neru-darwin-arm64.zip neru-darwin-arm64.zip.sha256

            - name: Upload darwin arm64 release artifacts
              env:
                  GH_TOKEN: ${{ secrets.upload_token || github.token }}
              run: |
                  gh release upload "${{ inputs.release_tag }}" neru-darwin-arm64.zip neru-darwin-arm64.zip.sha256 --clobber

    build-darwin-amd64-artifacts:
        runs-on: macos-15-intel
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-go@v6
              with:
                  go-version: "1.26.4"

            - uses: extractions/setup-just@v4
              with:
                  just-version: "1.54.0"

            - name: Build neru darwin amd64 artifact
              run: just release-ci-darwin amd64 ${{ inputs.version_override }}

            - name: Generate man pages
              run: go run ./cmd/genman build/man

            - name: Bundle neru-darwin-amd64
              run: |
                  mkdir -p build/amd64/Neru.app/Contents/{MacOS,Resources}
                  cp bin/neru-darwin-amd64 build/amd64/Neru.app/Contents/MacOS/neru
                  chmod +x build/amd64/Neru.app/Contents/MacOS/neru
                  cp resources/icon.icns build/amd64/Neru.app/Contents/Resources/icon.icns
                  cp resources/Neru.entitlements build/amd64/Neru.app/Contents/Resources/Neru.entitlements
                  mkdir -p build/amd64/share/man/man1
                  cp build/man/*.1 build/amd64/share/man/man1/
                  sed \
                    -e "s/BUNDLE_VERSION/${{ inputs.macos_bundle_version }}/g" \
                    -e "s/SHORT_VERSION/${{ inputs.macos_short_version }}/g" \
                    -e "s/BUILD_ID/${{ inputs.version_override }}/g" \
                    resources/Info.plist.template > build/amd64/Neru.app/Contents/Info.plist
                  mkdir -p build/amd64/bin
                  cp bin/neru-darwin-amd64 build/amd64/bin/neru
                  chmod +x build/amd64/bin/neru

            - name: Codesign neru-darwin-amd64 (ad-hoc)
              run: |
                  # TODO: Replace ad-hoc with Developer ID + notarization when cert is set up
                  #       Remove this step and uncomment the "Developer ID sign & notarize" step below.
                  codesign --force --deep --sign - \
                    --entitlements resources/Neru.entitlements \
                    --options runtime \
                    build/amd64/Neru.app

            # # TODO: Enable when Developer ID cert is set up (and disable the ad-hoc step above)
            # - name: Developer ID sign & notarize
            #   uses: ./.github/actions/developer-id-notarize
            #   with:
            #     app-path: build/amd64/Neru.app
            #     developer-id-identity: 'Developer ID Application: Your Name (TEAM_ID)'
            #     mac-developer-id-cert: ${{ secrets.mac_developer_id_cert }}
            #     mac-developer-id-key: ${{ secrets.mac_developer_id_key }}
            #     mac-dev-id-keychain-pwd: ${{ secrets.mac_dev_id_keychain_pwd }}
            #     apple-notary-api-issuer: ${{ secrets.apple_notary_api_issuer }}
            #     apple-notary-api-key-id: ${{ secrets.apple_notary_api_key_id }}
            #     apple-notary-api-key: ${{ secrets.apple_notary_api_key }}
            #     apple-team-id: ${{ secrets.apple_team_id }}

            - name: Package neru-darwin-amd64
              run: |
                  cd build/amd64
                  zip -r ../../neru-darwin-amd64.zip bin Neru.app share
                  cd ../..

            - name: Generate darwin amd64 checksum
              run: |
                  shasum -a 256 neru-darwin-amd64.zip | awk '{print $1}' > neru-darwin-amd64.zip.sha256
                  ls -l neru-darwin-amd64.zip neru-darwin-amd64.zip.sha256

            - name: Upload darwin amd64 release artifacts
              env:
                  GH_TOKEN: ${{ secrets.upload_token || github.token }}
              run: |
                  gh release upload "${{ inputs.release_tag }}" neru-darwin-amd64.zip neru-darwin-amd64.zip.sha256 --clobber

    build-linux-amd64-artifacts:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v7

            - name: Install Linux build dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libcairo2-dev \
                    libwayland-dev \
                    libx11-dev \
                    libxtst-dev \
                    libxrandr-dev \
                    libxinerama-dev \
                    libxfixes-dev \
                    libxkbcommon-dev \
                    wayland-protocols \
                    libei-dev \
                    liboeffis-dev

            - uses: actions/setup-go@v6
              with:
                  go-version: "1.26.4"

            - uses: extractions/setup-just@v4
              with:
                  just-version: "1.54.0"

            - name: Build neru linux amd64 artifact
              run: just release-ci-linux amd64 ${{ inputs.version_override }}

            - name: Generate man pages
              run: go run ./cmd/genman build/man

            - name: Bundle neru-linux-amd64
              run: |
                  mkdir -p build/linux-amd64/bin
                  cp bin/neru-linux-amd64 build/linux-amd64/bin/neru
                  chmod +x build/linux-amd64/bin/neru
                  mkdir -p build/linux-amd64/share/man/man1
                  cp build/man/*.1 build/linux-amd64/share/man/man1/

                  cd build/linux-amd64
                  zip -r ../../neru-linux-amd64.zip bin share
                  cd ../..

            - name: Generate linux amd64 checksum
              run: |
                  sha256sum neru-linux-amd64.zip | awk '{print $1}' > neru-linux-amd64.zip.sha256
                  ls -l neru-linux-amd64.zip neru-linux-amd64.zip.sha256

            - name: Upload linux amd64 release artifacts
              env:
                  GH_TOKEN: ${{ secrets.upload_token || github.token }}
              run: |
                  gh release upload "${{ inputs.release_tag }}" neru-linux-amd64.zip neru-linux-amd64.zip.sha256 --clobber

    build-linux-arm64-artifacts:
        runs-on: ubuntu-24.04-arm
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v7

            - name: Install Linux build dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libcairo2-dev \
                    libwayland-dev \
                    libx11-dev \
                    libxtst-dev \
                    libxrandr-dev \
                    libxinerama-dev \
                    libxfixes-dev \
                    libxkbcommon-dev \
                    wayland-protocols \
                    libei-dev \
                    liboeffis-dev

            - uses: actions/setup-go@v6
              with:
                  go-version: "1.26.4"

            - uses: extractions/setup-just@v4
              with:
                  just-version: "1.54.0"

            - name: Build neru linux arm64 artifact
              run: just release-ci-linux arm64 ${{ inputs.version_override }}

            - name: Generate man pages
              run: go run ./cmd/genman build/man

            - name: Bundle neru-linux-arm64
              run: |
                  mkdir -p build/linux-arm64/bin
                  cp bin/neru-linux-arm64 build/linux-arm64/bin/neru
                  chmod +x build/linux-arm64/bin/neru
                  mkdir -p build/linux-arm64/share/man/man1
                  cp build/man/*.1 build/linux-arm64/share/man/man1/

                  cd build/linux-arm64
                  zip -r ../../neru-linux-arm64.zip bin share
                  cd ../..

            - name: Generate linux arm64 checksum
              run: |
                  sha256sum neru-linux-arm64.zip | awk '{print $1}' > neru-linux-arm64.zip.sha256
                  ls -l neru-linux-arm64.zip neru-linux-arm64.zip.sha256

            - name: Upload linux arm64 release artifacts
              env:
                  GH_TOKEN: ${{ secrets.upload_token || github.token }}
              run: |
                  gh release upload "${{ inputs.release_tag }}" neru-linux-arm64.zip neru-linux-arm64.zip.sha256 --clobber

    build-windows-amd64-artifacts:
        runs-on: windows-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-go@v6
              with:
                  go-version: "1.26.4"

            - uses: extractions/setup-just@v4
              with:
                  just-version: "1.54.0"

            - name: Build neru windows amd64 artifact
              run: just release-ci-windows amd64 ${{ inputs.version_override }}
              shell: bash

            - name: Generate man pages
              run: go run ./cmd/genman build/man

            - name: Bundle neru-windows-amd64
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force -Path build/windows-amd64/bin
                  Copy-Item bin/neru-windows-amd64.exe build/windows-amd64/bin/neru.exe
                  New-Item -ItemType Directory -Force -Path build/windows-amd64/share/man/man1
                  Copy-Item build/man/*.1 build/windows-amd64/share/man/man1/
                  Compress-Archive -Path build/windows-amd64/* -DestinationPath neru-windows-amd64.zip

            - name: Generate windows amd64 checksum
              shell: pwsh
              run: |
                  $hash = (Get-FileHash neru-windows-amd64.zip -Algorithm SHA256).Hash.ToLower()
                  Set-Content -Path neru-windows-amd64.zip.sha256 -Value $hash

            - name: Upload windows amd64 release artifacts
              env:
                  GH_TOKEN: ${{ secrets.upload_token || github.token }}
              run: |
                  gh release upload "${{ inputs.release_tag }}" neru-windows-amd64.zip neru-windows-amd64.zip.sha256 --clobber

    build-windows-arm64-artifacts:
        runs-on: windows-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-go@v6
              with:
                  go-version: "1.26.4"

            - uses: extractions/setup-just@v4
              with:
                  just-version: "1.54.0"

            - name: Build neru windows arm64 artifact
              run: just release-ci-windows arm64 ${{ inputs.version_override }}
              shell: bash

            - name: Generate man pages
              run: go run ./cmd/genman build/man

            - name: Bundle neru-windows-arm64
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force -Path build/windows-arm64/bin
                  Copy-Item bin/neru-windows-arm64.exe build/windows-arm64/bin/neru.exe
                  New-Item -ItemType Directory -Force -Path build/windows-arm64/share/man/man1
                  Copy-Item build/man/*.1 build/windows-arm64/share/man/man1/
                  Compress-Archive -Path build/windows-arm64/* -DestinationPath neru-windows-arm64.zip

            - name: Generate windows arm64 checksum
              shell: pwsh
              run: |
                  $hash = (Get-FileHash neru-windows-arm64.zip -Algorithm SHA256).Hash.ToLower()
                  Set-Content -Path neru-windows-arm64.zip.sha256 -Value $hash

            - name: Upload windows arm64 release artifacts
              env:
                  GH_TOKEN: ${{ secrets.upload_token || github.token }}
              run: |
                  gh release upload "${{ inputs.release_tag }}" neru-windows-arm64.zip neru-windows-arm64.zip.sha256 --clobber
