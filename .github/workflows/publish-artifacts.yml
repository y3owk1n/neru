      - name: Upload linux arm64 release artifacts
        env:
          GH_TOKEN: ${{ secrets.upload_token || github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" neru-linux-arm64.zip neru-linux-arm64.zip.sha256 --clobber
