on:
    pull_request_target:
        types: [opened, synchronize, reopened]
name: Label PRs
permissions:
    contents: read
    pull-requests: write
jobs:
    label:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/labeler@v6
              with:
                  configuration-path: .github/labeler.yml
                  sync-labels: true
