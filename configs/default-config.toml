# Neru default configuration
# Copy to ~/.config/neru/config.toml to customize.

# Full config reference: https://github.com/y3owk1n/neru/blob/main/docs/CONFIGURATION.md
# Full CLI reference: https://github.com/y3owk1n/neru/blob/main/docs/CLI.md

# General settings
# See https://github.com/y3owk1n/neru/blob/main/docs/CONFIGURATION.md#general-settings
[general]
excluded_apps = []                           # Bundle IDs to ignore (e.g. "com.apple.Terminal")
accessibility_check_on_start = true          # Verify AX permissions on launch
restore_cursor_position = false              # Return cursor to pre-mode position on exit
center_cursor_position = false               # Center cursor on screen on exit (mutually exclusive with above)
kb_layout_to_use = ""                        # Force a keyboard layout InputSourceID (empty = auto)
mode_exit_keys = ["Escape"]                  # Keys that exit any active mode
passthrough_unbounded_keys = false           # Let unbound Cmd/Ctrl/Alt shortcuts reach macOS
should_exit_after_passthrough = false        # Exit the current mode after a shortcut is passed through
passthrough_unbounded_keys_blacklist = []    # Shortcuts to still consume when passthrough is on
hide_overlay_in_screen_share = false         # Hide overlay from screen sharing apps

# Hotkeys
# See https://github.com/y3owk1n/neru/blob/main/docs/CONFIGURATION.md#hotkeys
# See https://github.com/y3owk1n/neru/blob/main/docs/CLI.md
[hotkeys]
"Cmd+Shift+Space" = "hints"
"Cmd+Shift+G" = "grid"
"Cmd+Shift+C" = "recursive_grid"
"Cmd+Shift+S" = "scroll"

# Hint mode
# See https://github.com/y3owk1n/neru/blob/main/docs/CONFIGURATION.md#hint-mode
[hints]
enabled = true
auto_exit_actions = []                      # Actions that auto-exit hints (e.g. ["left_click"])
mode_exit_keys = []                         # Extra exit keys (merged with general.mode_exit_keys)
hint_characters = "asdfghjkl"               # Characters used for hint labels
backspace_key = "Backspace"                 # Key for input correction
mouse_action_refresh_delay = 0              # ms delay before refreshing hints after click (0 = immediate)
max_depth = 50                              # Max accessibility tree depth (0 = unlimited)
parallel_threshold = 20                     # Min children to trigger parallel tree building
include_menubar_hints = false
additional_menubar_hints_targets = [
    "com.apple.TextInputMenuAgent",
    "com.apple.controlcenter",
    "com.apple.systemuiserver",
]
include_dock_hints = false
include_nc_hints = false
include_stage_manager_hints = false
detect_mission_control = false
clickable_roles = [
    "AXButton",
    "AXComboBox",
    "AXCheckBox",
    "AXRadioButton",
    "AXLink",
    "AXPopUpButton",
    "AXTextField",
    "AXSlider",
    "AXTabButton",
    "AXSwitch",
    "AXDisclosureTriangle",
    "AXTextArea",
    "AXMenuButton",
    "AXMenuItem",
    "AXCell",
    "AXRow",
]
ignore_clickable_check = false

[hints.additional_ax_support]
enable = false                              # Enable enhanced AX for Electron/Chromium/Firefox apps
additional_electron_bundles = []
additional_chromium_bundles = []
additional_firefox_bundles = []

[hints.ui]
font_size = 10
font_family = ""                            # Empty = system font
border_radius = -1                          # -1 = auto pill
padding_x = -1                              # -1 = auto based on font size
padding_y = -1                              # -1 = auto based on font size
border_width = 1
background_color_light = "#F200CFCF"
background_color_dark = "#F2007A9E"
text_color_light = "#FF003554"
text_color_dark = "#FFFFFFFF"
matched_text_color_light = "#FFAAEEFF"
matched_text_color_dark = "#FF003554"
border_color_light = "#FF008A8A"
border_color_dark = "#FF00B4D8"

# Grid mode
# See https://github.com/y3owk1n/neru/blob/main/docs/CONFIGURATION.md#grid-mode
[grid]
enabled = true
auto_exit_actions = []                      # Actions that auto-exit grid (e.g. ["left_click"])
mode_exit_keys = []                         # Extra exit keys (merged with general.mode_exit_keys)
characters = "abcdefghijklmnpqrstuvwxyz"    # Primary grid labels
sublayer_keys = "abcdefghijklmnpqrstuvwxyz" # Subgrid labels (fallback to characters)
reset_key = " "                             # Key to clear input and start over
backspace_key = "Backspace"                 # Key for input correction
live_match_update = true                    # Highlight cells as you type
hide_unmatched = true                       # Hide non-matching cells
prewarm_enabled = true                      # Pre-compute grid on startup (~1.5MB RAM)
enable_gc = false                           # Periodic memory cleanup (adds CPU overhead)

[grid.ui]
font_size = 10
font_family = ""
border_width = 1
background_color_light = "#9900B4D8"
background_color_dark = "#99003554"
text_color_light = "#FF003554"
text_color_dark = "#FFB3E8F5"
matched_text_color_light = "#FFAAEEFF"
matched_text_color_dark = "#FFFFFFFF"
matched_background_color_light = "#B300CFCF"
matched_background_color_dark = "#B300B4D8"
matched_border_color_light = "#B300CFCF"
matched_border_color_dark = "#B300B4D8"
border_color_light = "#9900B4D8"
border_color_dark = "#99003554"

# Recursive grid mode (recommended)
# See https://github.com/y3owk1n/neru/blob/main/docs/CONFIGURATION.md#recursive-grid-mode-recommended
[recursive_grid]
enabled = true
auto_exit_actions = []                      # Actions that auto-exit (e.g. ["left_click"])
mode_exit_keys = []                         # Extra exit keys (merged with general.mode_exit_keys)
grid_cols = 2                               # Number of columns (>= 2)
grid_rows = 2                               # Number of rows (>= 2)
keys = "uijk"                               # Cell selection keys (must be grid_cols * grid_rows chars)
backspace_key = "Backspace"                 # Key to go up one recursion level
min_size_width = 25                         # Stop subdividing below this width (px)
min_size_height = 25                        # Stop subdividing below this height (px)
max_depth = 10                              # Maximum recursion levels (1–20)
reset_key = " "                             # Key to reset to initial center

[recursive_grid.ui]
line_color_light = "#FF007A9E"
line_color_dark = "#FF00CFCF"
line_width = 1
highlight_color_light = "#4D007A9E"
highlight_color_dark = "#4D00CFCF"
text_color_light = "#FF007A9E"
text_color_dark = "#FF00CFCF"
font_size = 10
font_family = ""
label_background = false                    # Add rounded backgrounds behind cell labels
label_background_color_light = "#FFAAEEFF"
label_background_color_dark = "#FF003554"
label_background_padding_x = -1
label_background_padding_y = -1
label_background_border_radius = -1
label_background_border_width = 1
sub_key_preview = false                     # Draw miniature key grid inside each cell
sub_key_preview_font_size = 8
sub_key_preview_autohide_multiplier = 1.5
sub_key_preview_text_color_light = "#66007A9E"
sub_key_preview_text_color_dark = "#6600CFCF"

# Scroll mode
# See https://github.com/y3owk1n/neru/blob/main/docs/CONFIGURATION.md#scroll-mode
[scroll]
scroll_step = 50                            # Pixels per j/k press
scroll_step_half = 500                      # Pixels for Ctrl+D/U (half page)
scroll_step_full = 1000000                  # Pixels for gg/G (top/bottom)
mode_exit_keys = []                         # Extra exit keys (merged with general.mode_exit_keys)

[scroll.key_bindings]
scroll_up = ["k", "Up"]
scroll_down = ["j", "Down"]
scroll_left = ["h", "Left"]
scroll_right = ["l", "Right"]
go_top = ["gg", "Cmd+Up"]
go_bottom = ["Shift+G", "Cmd+Down"]
page_up = ["Ctrl+U", "PageUp"]
page_down = ["Ctrl+D", "PageDown"]

# Mode indicator
# See https://github.com/y3owk1n/neru/blob/main/docs/CONFIGURATION.md#mode-indicator
[mode_indicator]

[mode_indicator.scroll]
enabled = true
text = "Scroll"

[mode_indicator.hints]
enabled = false
text = "Hints"

[mode_indicator.grid]
enabled = false
text = "Grid"

[mode_indicator.recursive_grid]
enabled = false
text = "Recursive Grid"

[mode_indicator.ui]
font_size = 10
font_family = ""
background_color_light = "#F200CFCF"
background_color_dark = "#F200CFCF"
text_color_light = "#FF003554"
text_color_dark = "#FF003554"
border_color_light = "#FF007A9E"
border_color_dark = "#FF007A9E"
border_width = 1
padding_x = -1
padding_y = -1
border_radius = -1
indicator_x_offset = 20
indicator_y_offset = 20

# Mouse movement actions (used inside hints/grid modes)
# See https://github.com/y3owk1n/neru/blob/main/docs/CONFIGURATION.md#mouse-movement-actions
[action]
move_mouse_step = 10                        # Pixels per arrow key press

[action.key_bindings]
left_click = "Shift+L"
right_click = "Shift+R"
middle_click = "Shift+M"
mouse_down = "Shift+I"                      # Press and hold mouse button
mouse_up = "Shift+U"                        # Release mouse button
move_mouse_up = "Up"
move_mouse_down = "Down"
move_mouse_left = "Left"
move_mouse_right = "Right"

# Smooth cursor (animates cursor movement between positions)
# See https://github.com/y3owk1n/neru/blob/main/docs/CONFIGURATION.md#smooth-cursor
[smooth_cursor]
move_mouse_enabled = false                  # Enable smooth mouse movement
steps = 10                                  # Number of intermediate positions
delay = 1                                   # Milliseconds between steps

# Systray
# See https://github.com/y3owk1n/neru/blob/main/docs/CONFIGURATION.md#systray
[systray]
enabled = true                              # Show menu bar icon (false = headless mode)

# Logging
# See https://github.com/y3owk1n/neru/blob/main/docs/CONFIGURATION.md#logging
[logging]
log_level = "info"                          # debug, info, warn, error
log_file = ""                               # Custom log path (empty = default location)
structured_logging = true                   # JSON format
disable_file_logging = true                 # Console only (no file)
max_file_size = 10                          # MB before rotation
max_backups = 5                             # Old log files to keep
max_age = 30                                # Days to retain old logs
