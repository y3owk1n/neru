# This is the default configuration file for Neru.
# It is NOT loaded by the application at runtime.
# To use this configuration, copy it to one of these locations:
#   ~/.config/neru/config.toml
#   ~/Library/Application Support/neru/config.toml
# Or specify a custom path with the --config flag.

[general]
# List of bundle IDs to exclude from Neru (e.g., "com.apple.finder")
# When Neru is active, it won't process hints/grid in these applications
excluded_apps = []

# Whether to check for accessibility permissions on startup
# If true, Neru will verify that accessibility permissions are granted before enabling features
accessibility_check_on_start = true

# Whether to restore cursor position after exiting modes
# When true, cursor returns to its original position after hints/grid/scroll mode exits
restore_cursor_position = false

# Whether to center cursor position after exiting modes
# When true, cursor is centered on the current screen after hints/grid/scroll mode exits
# Note: restore_cursor_position and center_cursor_position are mutually exclusive
center_cursor_position = false

# Optional reference keyboard layout for layout-agnostic key interpretation.
# Use macOS InputSourceID (e.g. "com.apple.keylayout.ABC").
# When omitted/empty, Neru auto-selects in this order:
#   1) com.apple.keylayout.ABC
#   2) com.apple.keylayout.US
#   3) First layout with language "en"
kb_layout_to_use = ""

# Keys that exit any active mode (hints, grid, or scroll)
# Supported formats:
#   - Named keys: "escape", "return", "tab", "space", "backspace", "delete", "home", "end", "pageup", "pagedown"
#   - Modifier combos: "Ctrl+C", "Cmd+Q", "Alt+X"
#   - Single characters: single letter/digit keys
# Examples:
#   mode_exit_keys = ["escape"]           # Exit with Escape key
#   mode_exit_keys = ["Ctrl+C"]           # Exit with Ctrl+C
#   mode_exit_keys = ["escape", "q"]      # Exit with Escape or Q
mode_exit_keys = ["escape"]

# Whether to hide the overlay from screen sharing (Zoom, Google Meet, OBS, etc.)
# When true, the overlay will not appear in shared screens but remains visible locally
# Note: Uses macOS NSWindow.sharingType API - effectiveness varies by application
# Note: This APIs is sort of deprecated as well, it might or might not work
# See CLI.md documentation for more details
hide_overlay_in_screen_share = false

[hotkeys]
# Hotkey bindings - key = action
# Supported modifiers: Cmd, Ctrl, Alt, Shift, Option
# Examples: "Cmd+Shift+Space" = "hints", "Cmd+Shift+G" = "grid"
"Cmd+Shift+Space" = "hints"
"Cmd+Shift+G" = "grid"
"Cmd+Shift+C" = "recursive_grid"
"Cmd+Shift+S" = "scroll"

# Direct actions are available in hints/grid mode without mode switching
# Use Cmd+L for left click, Cmd+R for right click, Cmd+M for middle click, etc.
# See the [action.key_bindings] section below for all available direct action keys.

# To run a shell command from a hotkey, prefix the value with `exec `:
# "Ctrl+Alt+T" = "exec open -a Terminal"
# "Ctrl+Alt+F" = "exec osascript -e 'display notification \"This is a test notification!\" with title \"Hello from Terminal\"'"

[hints]
# Whether to enable hints mode
enabled = true

# Actions that will cause hints mode to exit automatically after execution
# Valid values: left_click, right_click, middle_click, mouse_down, mouse_up, move_mouse_relative
# Default: [] (empty - no auto-exit)
# Example: auto_exit_actions = ["left_click", "middle_click"]
# Note: Including "move_mouse_relative" will exit on every arrow-key nudge, which is usually undesirable.
auto_exit_actions = []

# Characters to use for hint labels
hint_characters = "asdfghjkl"

# Visual appearance
font_size = 10      # Font size for hints
font_family = ""    # Font family for hints
border_radius = 4   # Corner radius for hint borders
padding = 4         # Padding inside hint borders
border_width = 1    # Width of hint borders

# Delay in milliseconds before refreshing hints after mouse click actions.
# Set to 0 for immediate refresh. Higher values reduce rapid refreshes
# when performing multiple clicks quickly. Maximum: 10000 (10 seconds).
mouse_action_refresh_delay = 0

# Maximum depth for accessibility tree traversal.
# Set to 0 for unlimited depth (no safety limit).
# Default: 50
max_depth = 50

# Minimum children to trigger parallel tree building.
# Default: 20
parallel_threshold = 20

background_color_light = "#F200CFCF"    # Hint background color for Light Mode (cyan, alpha F2 ≈ 95% opacity)
background_color_dark = "#F2007A9E"     # Hint background color for Dark Mode (deep teal, alpha F2 ≈ 95% opacity)
text_color_light = "#FF003554"          # Hint text color for Light Mode (deep navy)
text_color_dark = "#FFFFFFFF"           # Hint text color for Dark Mode (white)
matched_text_color_light = "#FFAAEEFF"  # Text color for matched hints for Light Mode (light sky blue)
matched_text_color_dark = "#FF003554"   # Text color for matched hints for Dark Mode (deep navy)
border_color_light = "#FF008A8A"        # Hint border color for Light Mode (teal)
border_color_dark = "#FF00B4D8"         # Hint border color for Dark Mode (sky blue)

# Additional hint targets
include_menubar_hints = false              # Include menubar items in hints
additional_menubar_hints_targets = [       # Extra menubar bundle IDs to include
    "com.apple.TextInputMenuAgent",
    "com.apple.controlcenter",
    "com.apple.systemuiserver",
]
include_dock_hints = false                  # Include dock items in hints
include_nc_hints = false                    # Include notification center in hints
include_stage_manager_hints = false         # Include stage manager items in hints
# Do not enable `detect_mission_control` if you are below macOS 26.x, it will break hints generation
# See https://github.com/y3owk1n/neru/issues/386 for more details
detect_mission_control = false              # Skip frontmost window hints when Mission Control is active

# Roles considered clickable
clickable_roles = [
    "AXButton",
    "AXComboBox",
    "AXCheckBox",
    "AXRadioButton",
    "AXLink",
    "AXPopUpButton",
    "AXTextField",
    "AXSlider",
    "AXTabButton",
    "AXSwitch",
    "AXDisclosureTriangle",
    "AXTextArea",
    "AXMenuButton",
    "AXMenuItem",
    "AXCell",
    "AXRow",
]

# Whether to ignore the clickable check (useful for some apps)
ignore_clickable_check = false

# Per-app role configurations
# These allow you to add additional clickable/scrollable roles for specific applications
# The roles defined here are ADDED to the global roles above (not replaced)
# To find an app's bundle ID, run: osascript -e 'id of app "AppName"'
#
# Application-specific configurations for customizing hint behavior per app
# Each entry allows overriding clickable roles, clickable check behavior, and
# mouse action refresh delay for specific bundle IDs
# [[hints.app_configs]]
# bundle_id = "com.example.app"
# additional_clickable_roles = ["AXCustomButton", "AXCustomLink"]
# ignore_clickable_check = true
# mouse_action_refresh_delay = 100  # Override delay for this app (nil/omitted = use global)
#
# [[hints.app_configs]]
# bundle_id = "com.another.app"
# additional_clickable_roles = ["AXSpecialRole"]
# ignore_clickable_check = false
# # Omit mouse_action_refresh_delay to use global hints.mouse_action_refresh_delay

# Electron/Chromium/Firefox support
[hints.additional_ax_support]
enable = false                          # Enable enhanced accessibility for web apps
additional_electron_bundles = []        # Extra Electron app bundle IDs
additional_chromium_bundles = []        # Extra Chromium app bundle IDs
additional_firefox_bundles = []         # Extra Firefox app bundle IDs

[grid]
# Whether to enable grid mode
enabled = true

# Actions that will cause grid mode to exit automatically after execution
# Valid values: left_click, right_click, middle_click, mouse_down, mouse_up, move_mouse_relative
# Default: [] (empty - no auto-exit)
# Example: auto_exit_actions = ["left_click", "middle_click"]
# Note: Including "move_mouse_relative" will exit on every arrow-key nudge, which is usually undesirable.
auto_exit_actions = []

# Characters to use for grid labels
# Requirements:
# - Must contain at least 2 characters
# - Only ASCII characters allowed (no Unicode)
# - Cannot contain the reset_key character (' ' / space by default)
# - No duplicate characters (case-insensitive)
# - Examples: "asdfghjkl", "qwertyuiop", "1234567890"
characters = "abcdefghijklmnpqrstuvwxyz"

# Characters to use for subgrid labels (fallback to grid.characters)
# Same requirements as characters above
sublayer_keys = "abcdefghijklmnpqrstuvwxyz"

# Single-character key to reset/clear grid input during grid mode
# While in grid mode, pressing this key clears your current input and starts over
# Useful for correcting mistakes while selecting grid coordinates
# Common choices: "," (comma), "." (period), "r" (r key)
# Note: Cannot be the same as any grid character to avoid conflicts
reset_key = " "

# Optional custom labels for rows and columns
# If not provided, labels will be inferred from characters
# Requirements (when specified):
# - Must contain at least 2 characters
# - Only ASCII characters allowed
# - Cannot contain the reset_key character (' ' / space by default)
# - No duplicate characters (case-insensitive)
# - Can include symbols like ',.pyfgcrl/aoeuidhtns-;qjkxbmwvz='
# Examples:
# row_labels = "123456789"      # Numbers for rows
# col_labels = "abcdefghij"     # Letters for columns
# row_labels = "',.pyfgcrl/"    # Dvorak-style rows
# col_labels = "aoeuidhtns"     # Dvorak-style columns

# Visual appearance
font_size = 10      # Font size for grid labels
font_family = ""    # Font family for grid labels
border_width = 1    # Width of grid cell borders

background_color_light = "#9900B4D8"         # Grid cell background color for Light Mode (sky blue, alpha 99 ≈ 60% opacity)
background_color_dark = "#99003554"          # Grid cell background color for Dark Mode (deep navy, alpha 99 ≈ 60% opacity)
text_color_light = "#FF003554"               # Grid label text color for Light Mode (deep navy)
text_color_dark = "#FFB3E8F5"                # Grid label text color for Dark Mode (pale cyan)
matched_text_color_light = "#FFAAEEFF"       # Text color for matched grid cells for Light Mode (light sky blue)
matched_text_color_dark = "#FFFFFFFF"        # Text color for matched grid cells for Dark Mode (white)
matched_background_color_light = "#B300CFCF" # Background color for matched grid cells for Light Mode (cyan, alpha B3 ≈ 70% opacity)
matched_background_color_dark = "#B300B4D8"  # Background color for matched grid cells for Dark Mode (sky blue, alpha B3 ≈ 70% opacity)
matched_border_color_light = "#B300CFCF"     # Border color for matched grid cells for Light Mode (cyan, alpha B3 ≈ 70% opacity)
matched_border_color_dark = "#B300B4D8"      # Border color for matched grid cells for Dark Mode (sky blue, alpha B3 ≈ 70% opacity)
border_color_light = "#9900B4D8"             # Grid cell border color for Light Mode (sky blue, alpha 99 ≈ 60% opacity)
border_color_dark = "#99003554"              # Grid cell border color for Dark Mode (deep navy, alpha 99 ≈ 60% opacity)

# Behavior
live_match_update = true
hide_unmatched = true
# Prewarm grid caches on startup for faster first use, but uses ~1.5MB memory and CPU at startup
prewarm_enabled = true
# Enable periodic garbage collection every 5 minutes to reduce peak memory usage, but adds CPU overhead
enable_gc = false

[recursive_grid]
# Whether to enable recursive-grid mode
enabled = true

# Actions that will cause recursive-grid mode to exit automatically after execution
# Valid values: left_click, right_click, middle_click, mouse_down, mouse_up, move_mouse_relative
# Default: [] (empty - no auto-exit)
# Example: auto_exit_actions = ["left_click", "middle_click"]
# Note: Including "move_mouse_relative" will exit on every arrow-key nudge, which is usually undesirable.
auto_exit_actions = []

# Grid layout: columns and rows (default: 2x2, must be >= 2)
# Higher values create finer grid division
# For non-square grids, use different values (e.g., grid_cols = 3, grid_rows = 2)
grid_cols = 2
grid_rows = 2

# Key bindings for cell selection
# Must be exactly grid_cols * grid_rows characters
# For 2x2: 4 keys (u=TL, i=TR, j=BL, k=BR)
keys = "uijk"

# Visual appearance
line_color_light = "#FF007A9E"           # Color of grid lines for Light Mode (deep teal, alpha FF = 100% opacity)
line_color_dark = "#FF00CFCF"            # Color of grid lines for Dark Mode (bright cyan, alpha FF = 100% opacity)
line_width = 1                           # Width of grid lines
highlight_color_light = "#4D007A9E"      # Color for cell highlighting for Light Mode (deep teal, alpha 4D ≈ 30% opacity)
highlight_color_dark = "#4D00CFCF"       # Color for cell highlighting for Dark Mode (bright cyan, alpha 4D ≈ 30% opacity)
text_color_light = "#FF007A9E"           # Text color for Light Mode (deep teal, fully opaque)
text_color_dark = "#FF00CFCF"            # Text color for Dark Mode (bright cyan, fully opaque)
font_size = 10                           # Font size for cell labels
font_family = ""                         # Font family for cell labels

# Behavior
min_size_width = 25            # Minimum cell width in pixels (stops dividing when width is reached)
min_size_height = 25           # Minimum cell height in pixels (stops dividing when height is reached)
max_depth = 10                 # Maximum recursion depth (safety limit)
reset_key = " "                # Reset to initial center and clear state

[scroll]
# Scroll step sizes
scroll_step = 50            # Base scroll distance for j/k keys
scroll_step_half = 500      # Scroll distance for Ctrl+D/U keys
scroll_step_full = 1000000  # Scroll distance for Shift+G/g keys

# Key bindings for scroll mode
# Each action can have multiple keys assigned to it
# Key format:
#   - Single key: "j", "k", "g", "G", etc.
#   - Modifier keys: "Ctrl+U", "Cmd+Down", etc.
#   - Multi-key sequences: "gg" (press g then g again)
#   - Special keys: "Up", "Down", "Left", "Right", "PageUp", "PageDown", "Home", "End"
#
# Available actions:
#   scroll_up    - Scroll up by one line
#   scroll_down  - Scroll down by one line
#   scroll_left  - Scroll left by one line
#   scroll_right - Scroll right by one line
#   go_top       - Scroll to the top of the page
#   go_bottom    - Scroll to the bottom of the page
#   page_up      - Scroll up by half page
#   page_down    - Scroll down by half page
[scroll.key_bindings]
scroll_up = ["k", "Up"]
scroll_down = ["j", "Down"]
scroll_left = ["h", "Left"]
scroll_right = ["l", "Right"]
go_top = ["gg", "Cmd+Up"]
go_bottom = ["Shift+G", "Cmd+Down"]
page_up = ["Ctrl+U", "PageUp"]
page_down = ["Ctrl+D", "PageDown"]

# Custom examples:
# To use vim-style navigation with arrow keys:
# scroll_up = ["k", "Up", "Ctrl+P"]
# scroll_down = ["j", "Down", "Ctrl+N"]
#
# To map Home/End for top/bottom:
# go_top = ["gg", "Home"]
# go_bottom = ["G", "End"]
#

# Mode indicator - cursor-following label showing current mode
# When enabled for a mode, displays the mode name near the cursor
[mode_indicator]
scroll_enabled = true
hints_enabled = false
grid_enabled = false
recursive_grid_enabled = false

font_size = 10                       # Font size for mode indicators
font_family = ""			         # Font family for mode indicators
background_color_light = "#F200CFCF" # Background color for Light Mode (cyan, alpha F2 ≈ 95% opacity)
background_color_dark = "#F200CFCF"  # Background color for Dark Mode (cyan, alpha F2 ≈ 95% opacity)
text_color_light = "#FF003554"       # Text color for Light Mode (deep navy)
text_color_dark = "#FF003554"        # Text color for Dark Mode (deep navy)
border_color_light = "#FF007A9E"     # Border color for Light Mode (deep teal)
border_color_dark = "#FF007A9E"      # Border color for Dark Mode (deep teal)
border_width = 1                     # Border width
padding = 4                          # Padding inside the indicator
border_radius = 4                    # Corner radius
indicator_x_offset = 20              # X offset from cursor position
indicator_y_offset = 20              # Y offset from cursor position

# Action keybindings for use in hints/grid mode
# Valid formats:
#   - Modifier+Key: Cmd+L, Shift+Return (at least 1 modifier + alphabet or Return/Enter)
#   - Single special key: Return, Enter
[action]
# Step size in pixels for keyboard-driven mouse movement (Up/Down/Left/Right keys)
move_mouse_step = 10

[action.key_bindings]
left_click = "Shift+L"     # Left click at current cursor position
right_click = "Shift+R"    # Right click at current cursor position
middle_click = "Shift+M"   # Middle click at current cursor position
mouse_down = "Shift+I"     # Press and hold mouse button
mouse_up = "Shift+U"       # Release mouse button
move_mouse_up = "Up"       # Move cursor up by move_mouse_step pixels
move_mouse_down = "Down"   # Move cursor down by move_mouse_step pixels
move_mouse_left = "Left"   # Move cursor left by move_mouse_step pixels
move_mouse_right = "Right" # Move cursor right by move_mouse_step pixels

# Alternative formats examples:
# left_click = "Shift+Return"  # Modifier + Return
# left_click = "Return"        # Single Return key
# left_click = "Enter"         # Single Enter key
# left_click = "Cmd+L"         # Use Cmd instead of Shift

# Usage in hints/grid mode:
# 1. Activate hints or grid mode
# 2. Type a label to select an element/position
# 3. Press the direct action key (e.g., Shift+L) to perform the action
#    The action is performed at the selected position without needing to switch modes

# CLI usage examples:
# neru action move_mouse --x 500 --y 300          # Move cursor to absolute position
# neru action move_mouse_relative --dx 10 --dy -5 # Move cursor relatively

[smooth_cursor]
# Whether to enable smooth mouse movement
# Note that this is not smooth scrolling, but just smooth for moving the mouse cursor from one position to another
move_mouse_enabled = false

# Number of steps for smooth movement
steps = 10

# Delay between steps in milliseconds
delay = 1

[systray]
# Whether to enable the system tray icon
# If false, the application will run in headless mode without a menu bar icon
enabled = true

[logging]
# Log level: debug, info, warn, error
log_level = "info"

# Log file path (empty = default location)
log_file = ""

# Whether to use structured (JSON) logging
structured_logging = true

# Whether to disable file logging entirely (logs only to stdout/stderr)
disable_file_logging = false

# Maximum size in megabytes of the log file before it gets rotated
max_file_size = 10

# Maximum number of old log files to retain
max_backups = 5

# Maximum number of days to retain old log files
max_age = 30
