# This is a backup configuration file for Neru old colors prior revamp.
# Just in case you like the old colors, you can copy the colors to your config directory.
# Do not use this file directly.

[hints]
[hints.ui]
background_color_light = "#F2FFD700"    # Hint background color for Light Mode (gold, alpha F2 ≈ 95% opacity)
background_color_dark = "#F2FFD700"     # Hint background color for Dark Mode
text_color_light = "#FF000000"          # Hint text color for Light Mode (black)
text_color_dark = "#FF000000"           # Hint text color for Dark Mode
matched_text_color_light = "#FF737373"  # Text color for matched hints for Light Mode (gray)
matched_text_color_dark = "#FF737373"   # Text color for matched hints for Dark Mode
border_color_light = "#FF000000"        # Hint border color for Light Mode (black)
border_color_dark = "#FF000000"         # Hint border color for Dark Mode

[grid]
[grid.ui]
background_color_light = "#B3ABE9B3"         # Grid cell background color for Light Mode (light green, alpha B3 ≈ 70% opacity)
background_color_dark = "#B3ABE9B3"          # Grid cell background color for Dark Mode
text_color_light = "#FF000000"               # Grid label text color for Light Mode (black)
text_color_dark = "#FF000000"                # Grid label text color for Dark Mode
matched_text_color_light = "#FFF8BD96"       # Text color for matched grid cells for Light Mode (orange)
matched_text_color_dark = "#FFF8BD96"        # Text color for matched grid cells for Dark Mode
matched_background_color_light = "#B3F8BD96" # Background color for matched grid cells for Light Mode (orange, alpha B3 ≈ 70% opacity)
matched_background_color_dark = "#B3F8BD96"  # Background color for matched grid cells for Dark Mode
matched_border_color_light = "#B3F8BD96"     # Border color for matched grid cells for Light Mode (orange, alpha B3 ≈ 70% opacity)
matched_border_color_dark = "#B3F8BD96"      # Border color for matched grid cells for Dark Mode
border_color_light = "#B3ABE9B3"             # Grid cell border color for Light Mode (light green, alpha B3 ≈ 70% opacity)
border_color_dark = "#B3ABE9B3"              # Grid cell border color for Dark Mode

[recursive_grid]
[recursive_grid.ui]
line_color_light = "#FF8EE2FF"           # Color of grid lines for Light Mode (light blue, alpha FF = 100% opacity)
line_color_dark = "#FF8EE2FF"            # Color of grid lines for Dark Mode
highlight_color_light = "#4D00BFFF"      # Color for cell highlighting for Light Mode (deep sky blue, alpha 4D ≈ 30% opacity)
highlight_color_dark = "#4D00BFFF"       # Color for cell highlighting for Dark Mode
text_color_light = "#FFFFFFFF"           # Text color for Light Mode for Light Mode (white, fully opaque)
text_color_dark = "#FFFFFFFF"            # Text color for Dark Mode

[mode_indicator]
[mode_indicator.ui]
background_color_light = "#F2FFD700" # Background color for Light Mode (gold with 95% opacity)
background_color_dark = "#F2FFD700"  # Background color for Dark Mode
text_color_light = "#FF000000"       # Text color for Light Mode (black)
text_color_dark = "#FF000000"        # Text color for Dark Mode
border_color_light = "#FF000000"     # Border color for Light Mode (black)
border_color_dark = "#FF000000"      # Border color for Dark Mode
