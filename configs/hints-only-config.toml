# Neru Configuration - Hints Only Mode

[hotkeys]
"Primary+Shift+Space" = "hints"
"Primary+Shift+S" = "scroll"

[hints]
enabled = true
max_depth = 50
include_menubar_hints = true               # Show hints on menubar
include_dock_hints = true                  # Show hints on Dock and Mission Control
include_nc_hints = true                    # Show hints on Notification Center
include_stage_manager_hints = true         # Include stage manager items in hints
include_pip_hints = true
include_screen_capture_hints = true
detect_mission_control = false             # Skip frontmost window hints when Mission Control is active
additional_menubar_hints_targets = [
    "com.apple.TextInputMenuAgent",
    "com.apple.controlcenter",
    "com.apple.systemuiserver",
    "com.y3owk1n.neru",
]
clickable_roles = [
    "AXButton",
	"AXMenuButton",
    "AXComboBox",
    "AXCheckBox",
    "AXRadioButton",
    "AXLink",
    "AXPopUpButton",
    "AXTextField",
    "AXSlider",
    "AXTabButton",
    "AXSwitch",
    "AXDisclosureTriangle",
    "AXTextArea",
    "AXMenuItem",
    "AXCell",
    "AXRow",
]
ignore_clickable_check = false

## Application-specific configurations for customizing hint behavior per app
## Each entry allows overriding clickable roles and clickable check behavior for specific bundle IDs
# [[hints.app_configs]]
# bundle_id = "com.brave.Browser"
# additional_clickable_roles = ["AXTabGroup"]
# ignore_clickable_check = false
# hotkeys = {
# 	"Return" = "action left_click",
# 	"Shift+L" = "__disabled__"
# }

# Keep hints live as the focused app's UI changes (macOS only for now). Native
# windows, menus, and browser web content all refresh.
[hints.auto_refresh]
enabled = true
debounce_ms = 150
allowed_notifications = [
  "created", "ui_destroyed", "layout_changed",
  "window_created", "window_moved", "window_resized",
  "load_complete", "menu_opened", "menu_closed",
  "focused_ui_element_changed",
  "live_region_changed", "live_region_created", "expanded_changed",
  "row_expanded", "row_collapsed", "element_busy_changed",
]

[grid]
enabled = false

[recursive_grid]
enabled = false
