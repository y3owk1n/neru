# Neru Configuration - Recursive Grid Only Mode

[hotkeys]
"Cmd+Shift+Space" = "recursive_grid"
"Cmd+Shift+S" = "scroll"

[hints]
enabled = false

[grid]
enabled = false

[recursive_grid]
enabled = true
animate = false
animation_duration_ms = 180
grid_cols = 2
grid_rows = 2
keys = "uijk"

[recursive_grid.ui]
# Add rounded label backgrounds behind recursive-grid letters
label_background = false
label_background_color = { light = "#EEF2FF", dark = "#0A1338" }
label_background_padding_x = -1
label_background_padding_y = -1
label_background_border_radius = -1
label_background_border_width = 1
# Sub-key preview: draw a miniature key grid inside each cell
sub_key_preview = false
sub_key_preview_font_size = 8
sub_key_preview_text_color = { light = "#465FBC", dark = "#6E82D6" }
