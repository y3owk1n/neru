# Neru Configuration - Recursive Grid Only Mode

[general]
# Applications to exclude from Neru functionality
excluded_apps = []

# Check Accessibility permission on startup; exits with guidance if missing.
accessibility_check_on_start = true

[hotkeys]
"Cmd+Shift+Space" = "recursive_grid"
"Cmd+Shift+S" = "scroll"

[hints]
# Hints mode - DISABLED
enabled = false

[grid]
# Grid mode - DISABLED
enabled = false

[recursive_grid]
# Recursive Grid mode - ENABLED with all features
enabled = true

# Grid layout: columns and rows (must be >= 2)
grid_cols = 2
grid_rows = 2

# Key bindings for cell selection
# Must be exactly grid_cols * grid_rows characters
# For 2x2: 4 keys (u=TL, i=TR, j=BL, k=BR)
keys = "uijk"

[recursive_grid.ui]
# Add rounded label backgrounds behind recursive-grid letters
label_background = false
label_background_color_light = "#FFAAEEFF"
label_background_color_dark = "#FF003554"
label_background_padding_x = -1
label_background_padding_y = -1
label_background_border_radius = -1
label_background_border_width = 1
# Sub-key preview: draw a miniature key grid inside each cell
sub_key_preview = false
sub_key_preview_font_size = 8
sub_key_preview_text_color_light = "#66007A9E"
sub_key_preview_text_color_dark = "#6600CFCF"
